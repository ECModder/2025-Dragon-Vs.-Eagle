 LOADING_TIP_54: "The creatures outside looked from pig to man, and from man to pig, and from pig to man again. but already it was impossible to tell which was which.\n- George Orwell"
 LOADING_TIP_55: "No matter if it is a white cat or a black cat; as long as it can catch mice, it is a good cat.\n- Deng Xiaoping"
 LOADING_TIP_56: "The greatest leader is not necessarily the one who does the greatest things. He is the one that gets the people to do the greatest things.\n- Ronald Reagan"
