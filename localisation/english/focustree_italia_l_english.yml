l_english:
ITA_make_the_union_yours:0 "Make the Union Yours"
ITA_make_the_union_yours_desc:0 "The Federation of Employees and Workers (Federazione Impiegati Operai Metallurgici) is a Labour union representing workers in the metal and engineering industries in Italy."
ITA_a_loyal_administration:0 "a Loyal Administration"
ITA_a_loyal_administration_desc:0 "Political figures, officers, and influential institutions are asked to swear loyalty to the restored Kingdom."
ITA_irredentism:0 "Irredentism"
ITA_irredentism_desc:0 "Savoy, Nice, Istria, Albania, Corsica ARE ITALIAN!"
ITA_green_new_deal:0 "Green New Deal"
ITA_green_new_deal_desc:0 "The Italian Green New Deal is the national reform and investment program that transposes and implements the objectives of the European Green Deal. Its main purpose is to achieve climate neutrality by 2050, promoting decarbonization, the circular economy and sustainable development through funds dedicated to companies"
ITA_national_revival:0 "National Revival"
ITA_national_revival_desc:0 "Nationalist movements claim that only decisive action can restore Italy's strenght."
ITA_emanuele_filiberto_di_savoia:0 "Emanuele Filiberto di Savoia"
ITA_emanuele_filiberto_di_savoia_desc:0 "Emanuele Filiberto di Savoia takes the charge of King of Italy. The Kingdom is restored since 1946."
ITA_occupied_factories:0 "Occupied Factories"
ITA_occupied_factories_desc:0 "Factory occupations are actions where workers take control of a facility to prevent lockouts, asset-stripping, or mass layoffs. Workers often self-manage or attempt to transition the site into a cooperative."
ITA_the_kingdom_reborn:0 "The Kingdom Reborn"
ITA_the_kingdom_reborn_desc:0 "The Kingdom of Italy rises once more, seeking a place in the modern world."
ITA_traditional_values:0 "Traditional Values"
ITA_traditional_values_desc:0 "The state emphasizes continuity, identity and historical institutions"
ITA_expand_state_authority:0 "Expand State Authority"
ITA_expand_state_authority_desc:0 "The state expands its role in strategic sectors and instituitions."
ITA_new_jobs:0 "New jobs"
ITA_new_jobs_desc:0 "The Green New Deal In addition to direct support for companies, the plan implies an important infrastructure conversion of the country. The investments involve crucial sectors such as energy, transportation, construction and agriculture."
ITA_second_march_on_rome:0 "Second March on Rome"
ITA_second_march_on_rome_desc:0 "Historical symbolism is used to unite supporters behind a new movement."
ITA_fascismisback:0 "Fascism is back!"
ITA_fascismisback_desc:0 "Fascism once again takes control of the Italian Governament through a coup."
ITA_casasavoia:0 "Casa Savoia!"
ITA_casasavoia_desc:0 "The coup was staged by the Monarchist and it has success! But at what cost..."
ITA_good_old_days:0 "Good old Days"
ITA_good_old_days_desc:0 "A coup is staged against the Republic. Who will come to power?"
ITA_rooting_of_the_party:0 "Rooting of the Party"
ITA_rooting_of_the_party_desc:0 "\"The party is not built on impulsive actions, but on the solid foundation of scientific and revolutionary strategy.\" \n-Arrigo Cervetto 1964"
ITA_reorganize_the_state:0 "Reorganize the State"
ITA_reorganize_the_state_desc:0 "The institutions of the nation are reshaped around the authority of the crown."
ITA_hardline_communist:0 "Hardline communist"
ITA_hardline_communist_desc:0 "Hardline communism (Stalinism) is an ideological and political system characterized by extreme totalitarian control. It centralizes absolute power within the state and ruling party, enforces rapid, state-led industrialization, and eliminates dissent through censorship, purges, and mass repression"
ITA_leninist_and_trotskyist_alliance:0 "Leninist and Trotskyist Alliance"
ITA_leninist_and_trotskyist_alliance_desc:0 "The Leninist-Trotskyist alliance refers to the political and personal partnership forged in 1922–1923 between Vladimir Lenin and Leon Trotsky. Formed to combat the rising bureaucratic apparatus—particularly Joseph Stalin—the alliance prioritized preserving democratic workers' control, protecting the foreign trade monopoly, and promoting international world revolution"
ITA_on_the_side_of_the_proletariat:0 "on the Side of the Proletariat"
ITA_on_the_side_of_the_proletariat_desc:0 "Being \"on the side of the proletariat\" means siding politically, historically, and economically with the working and wage-earning classes. It is the fundamental principle of Marxist thought, which holds that workers must take control of the means of production to overcome capitalism and create a classless society."
ITA_the_international:0 "the International"
ITA_the_international_desc:0 "Arise ye workers from your slumbers\nArise ye prisoners of want\nFor reason in revolt now thunders\nAnd at last ends the age of cant.\nAway with all your superstitions\nServile masses arise, arise\nWe’ll change henceforth the old tradition\nAnd spurn the dust to win the prize.\n\nRefrain:\nSo comrades, come rally\nAnd the last fight let us face\nThe Internationale unites the human race.\n\nNo more deluded by reaction\nOn tyrants only we’ll make war\nThe soldiers too will take strike action\nThey’ll break ranks and fight no more\nAnd if those cannibals keep trying\nTo sacrifice us to their pride\nThey soon shall hear the bullets flying\nWe’ll shoot the generals on our own side.\n\nNo saviour from on high delivers\nNo faith have we in prince or peer\nOur own right hand the chains must shiver\nChains of hatred, greed and fear\nE’er the thieves will out with their booty\nAnd give to all a happier lot.\nEach at the forge must do their duty\nAnd we’ll strike while the iron is hot."
ITA_againstwarrevolution:0 "against war: REVOLUTION!!!"
ITA_againstwarrevolution_desc:0 "The concept of a \"war on war\" through social revolution has its historical roots in antimilitarist, anarchist, and radical socialist movements, which see armed conflict as a direct consequence of the capitalist system and imperialism. This perspective rejects simple institutional pacifism, arguing that the only way to definitively eradicate war is to radically transform the political and economic structure of society."
ITA_single_market_expansion:0 "Single Market Expansion"
ITA_single_market_expansion_desc:0 "The removal of economic barriers may strengthen European prosperity and create new opportunities for Italy."
ITA_european_integration:0 "European Integration"
ITA_european_integration_desc:0 "Italy fully embraces a stronger and more unified European project."
ITA_start_the_coup_de_main:0 "start the Coup de Main"
ITA_start_the_coup_de_main_desc:0 "A coup de main refers to the lightning-fast act by which an organized group of revolutionaries captures the nerve centers of power (communication points, barracks, government buildings) in order to bring down the existing regime in one fell swoop, exploiting maximum surprise and direct action rather than a war of attrition."
ITA_strengthen_the_concept_of_unity:0 "Strengthen the concept of unity"
ITA_strengthen_the_concept_of_unity_desc:0 "You decide to stick with the European Parlament and be united with the rest of Europe."
ITA_european_union:0 "European Union"
ITA_european_union_desc:0 "You either choose to stick with the EU or leave the EU"
ITA_digital_europe:0 "Digital Europe"
ITA_digital_europe_desc:0 "European technological development is essential for long-term competitiveness."
ITA_connections_in_the_army:0 "Connections in the army"
ITA_connections_in_the_army_desc:0 "The armed forces undergo modernization and oranizational restructuring."
ITA_defend_national_values:0 "Defend National Values"
ITA_defend_national_values_desc:0 "Public debate increasingly focuses on preserving and promoting Italian cultural identity."
ITA_matteismediterraneanplan:0 "Mattei's Mediterranean Plan"
ITA_matteismediterraneanplan_desc:0 "Through investment and energy cooperation, Italy seeks to establish itself as a central power in the mediterranean."
ITA_secure_the_borders:0 "Secure the Borders"
ITA_secure_the_borders_desc:0 "Control over borders and strategic infrastructure is considered essential for national security"
ITA_italyregionalpower:0 "Italy: Regional Power"
ITA_italyregionalpower_desc:0 "Rome once again look toward the Mediterranean as the center of its political and economic influence"
ITA_protect_made_in_italy:0 "Protect Made in Italy"
ITA_protect_made_in_italy_desc:0 "Italian industries must be strengthened and protected in order to remain competitive in international markets."
ITA_consolidate_the_governament:0 "Consolidate the Governament"
ITA_consolidate_the_governament_desc:0 "Political fragmentation has slowed the state's ability to act decisively. A stable administration may allow Italy to persue long-term strategic goals."
ITA_roberto_vannacci:0 "Roberto Vannacci"
ITA_roberto_vannacci_desc:0 "Roberto Vannacci becomes the Italian Prime Minister."
ITA_giorgia_meloni:0 "Giorgia Meloni"
ITA_giorgia_meloni_desc:0 "Giorgia Meloni remains the Italian Prime Minister."
ITA_futuro_nazionale:0 "Futuro Nazionale"
ITA_futuro_nazionale_desc:0 "The \"National Future\" Party wins the elections."
ITA_conservative_victory:0 "Conservative Victory"
ITA_conservative_victory_desc:0 "The \"Brothers of Italy\" Party wins the elections."
ITA_new_national_republic:0 "New National Republic"
ITA_new_national_republic_desc:0 "A new vision of the state emerges: centralized, cohesive and focused on security"
ITA_the_right_side:0 "the Right Side"
ITA_the_right_side_desc:0 "A right-party wins the elections and takes charge of the Italian Parlament."
ITA_elly_schlein:0 "Elly Schlein"
ITA_elly_schlein_desc:0 "Elly Schlein becomes Prime Minister of Italy."
ITA_francesco_de_martino:0 "Francesco De Martino"
ITA_francesco_de_martino_desc:0 "Francesco De Martino becomes the Italian Prime Minister"
ITA_socialist_victory:0 "Socialist victory"
ITA_socialist_victory_desc:0 "The party was established in 2007–2008 by the merger of the following social-democratic parties and groups: Enrico Boselli's Italian Democratic Socialists (legal successor of the Italian Socialist Party), the faction of the New Italian Socialist Party led by Gianni De Michelis, The Italian Socialists of Bobo Craxi, Democracy and Socialism of Gavino Angius, the Association for the Rose in the Fist of Lanfranco Turci, \"Socialism is Freedom\" of Rino Formica and some other minor organisations. Until October 2009 the party was known as Socialist Party (Italian: Partito Socialista, PS). The party was led by Riccardo Nencini from 2008 to 2019: elected senator with the Democratic Party in 2013 and re-elected in 2018, he was deputy minister of Infrastructures and Transports from 2014 to 2019 (Renzi government and Gentiloni government)."
ITA_centerleft_victory:0 "Center-Left Victory"
ITA_centerleft_victory_desc:0 "The italian Democratic Party wins the elections."
ITA_the_left_side:0 "the Left Side"
ITA_the_left_side_desc:0 "A left-party wins the elections and takes charge of the Italian Parlament."
ITA_democratic_spectrum:0 "Democratic Spectrum"
ITA_democratic_spectrum_desc:0 "The repubblic will be guided by a Parliamentary party owner."
ITA_popular_appeal:0 "Popular Appeal"
ITA_popular_appeal_desc:0 "A new movement promises change, order and a renewed sense of national identity"
ITA_restore_the_crown:0 "Restore the Crown"
ITA_restore_the_crown_desc:0 "The monarchy returns as te central institution of the Italian State."
ITA_pdrc_majority:0 "PdRC Majority"
ITA_pdrc_majority_desc:0 "The \"Partito della Rifondazione Comunista\" (PdRC), known simply as \"Rifondazione,\" is a political party born in Italy. It was founded in 1991 by a segment of the Stalinist faction of the Italian Communist Party opposed to its dissolution. After the incorporation of \"Democrazia Proletaria\" and several extra-parliamentary groups, it took the name PdRC, engaging in dialogue with the Center-Left during the so-called Second Republic."
ITA_stakhanovism:0 "Stakhanovism"
ITA_stakhanovism_desc:0 "The Stakhanovites modeled themselves after the mythic productivity of the Russian coal miner Alexei Stakhanov. As frontline workers they took pride in their aspirations to work harder and more efficiently than was required by ad hoc norms; thereby they saw themselves as contributing to the common good and strengthening the socialist state. The Party started the 'movement' in the coal industry and then applied it to other industries across the Soviet Union. Initially popular, it eventually encountered resistance as the pressures for greater productivity placed increased and unrealistic demands on workers."
ITA_peoplesfrance:0 "People's France"
ITA_peoplesfrance_desc:0 "The so-called democracy in France is nothing but a mask for bourgeois tyranny. To ensure the survival of our socialist republic and free the French workers from their capitalist chains, we must bring the revolution across the Alps by force."
ITA_hold_conferences:0 "Hold conferences"
ITA_hold_conferences_desc:0 "Political conferences serve as critical arenas for politicians, activists, and scholars to set policy agendas, test party dynamics, and shape global or regional discourse. Because you are located in the Metropolitan City of Genoa, Italy, you have access to a wealth of upcoming academic and policy summits taking place throughout the country."
ITA_social_cohesion_fund:0 "Social Cohesion Fund"
ITA_social_cohesion_fund_desc:0 "Economic disparities continue to threaten unity within Europe. Shared investments seek to reduce inequalities and reinforce social stability."
ITA_eu_research_program:0 "EU Research Program"
ITA_eu_research_program_desc:0 "Joint scientific initiavites may accelerate innovation"
ITA_funds_for_schools:0 "Funds for Schools"
ITA_funds_for_schools_desc:0 "School funding in Genoa and across Italy is primarily managed by the State, Regions, and Municipalities, with significant additional investment from the European Union. Today, public schools can directly access targeted national and EU grants for structural renovations, digital transition, and educational projects."
ITA_kingsparliament:0 "King's Parliament"
ITA_kingsparliament_desc:0 "A parliament nominated by a king typically refers to a royal absolutist system, an absolute monarchy, or an upper house (such as a Senate or House of Lords) whose members are appointed by the monarch. In these systems, the king holds ultimate legislative or executive power, either alongside or completely independent of an elected body"
ITA_kingsindustry:0 "King's Industry"
ITA_kingsindustry_desc:0 "\"The true strength of the Crown lies not just in the loyalty of its subjects, but in the fires of its furnaces and the efficiency of its assembly lines. By centralizing our production under royal oversight and mobilizing national resources, we will transform our realm into an unstoppable industrial powerhouse. Capital and labor shall unite under one banner to forge the weapons of tomorrow.\""
ITA_gran_consiglio_del_fascismo:0 "Gran Consiglio del Fascismo"
ITA_gran_consiglio_del_fascismo_desc:0 "A new parlament is created and its power is between the Dvce and the Parlament."
ITA_the_dvx_is_back:0 "The DVX is back"
ITA_the_dvx_is_back_desc:0 "The fascist army that did the coup need a strong leader and the one that guided them to Rome has to take power: Carmine Masiello. The name of the Prime Minister becomes DUX that in latin means 'guide'"
ITA_communist_demonstrations:0 "Communist demonstrations"
ITA_communist_demonstrations_desc:0 "Communist demonstrations are organized public protests promoting Marxist, socialist, or communist ideologies. These events range from grassroots union actions to mass uprisings, often with the goal of systemic change away from capitalism and toward working-class emancipation, wealth redistribution, or workers' control of the means of production."
ITA_infiltration_into_the_army:0 "infiltration into the army"
ITA_infiltration_into_the_army_desc:0 "To ensure the success of the revolution, we must secure control of the bourgeois state's war machine. By placing communist elements in command posts and converting entire battalions to Marxism, we will undermine the resistance of the old capitalist regime. Against War: Revolution"
ITA_stalinist_coup:0 "Stalinist Coup"
ITA_stalinist_coup_desc:0 "Stalinism is the means of governing  policies implemented in the Soviet Union (USSR) from 1927 to 1953 by Joseph Stalin and from 1953 to 1991 by his successors. It included the creation of a one-party totalitarian police state, the theory of socialism in one country, state capitalism, the cult of personality of stalin, and subordination of the interests of foreign communist parties to those of the Communist Party of the Soviet Union"
ITA_potere_al_popolo:0 "Potere al Popolo"
ITA_potere_al_popolo_desc:0 "Power to the People! (PaP) is an Italian radical left and far-left political movement, launched in December 2017 as an electoral list in view of the general and regional elections in Lazio on 4 March 2018. It established itself as an autonomous political organization between October 2018 and January 2019."
ITA_cambiare_rotta:0 "Cambiare Rotta"
ITA_cambiare_rotta_desc:0 "\"Cambiare Rotta\" was born as an organized expression of youth and student militancy, with the aim of carrying out anti-capitalist struggles in schools and universities, but not in the workplace. Despite its initial premise, it pursued Stalinist and pro-Russian (Putinist) dialectics and ideals."
ITA_newpartynewidentity:0 "New Party, New Identity"
ITA_newpartynewidentity_desc:0 "create a new party, create a new identity.\nWE MADE THE REVOLUTION!!! FROM THE BEGINNING!!!."
ITA_soviet_parliament:0 "Soviet Parliament"
ITA_soviet_parliament_desc:0 "The Supreme Soviet of the Union of Soviet Socialist Republics was the highest organ of state authority of the Soviet Union from 1936 to 1991. Based on the principle of unified power, it was the only branch of government in the Soviet state, and headed the unified state apparatus.\n\nPrior to 1936, the Congress of Soviets was the highest organ of state authority. The Supreme Soviet appointed the Council of Ministers, the Supreme Court, and the Procurator General of the Soviet Union as well as elected the Presidium which served as the Soviet Union's collective head of state under both the Soviet Constitutions.\n\nBy the Soviet constitutions of 1936 and 1977, the Supreme Soviet was defined as the highest organ of state power in the Soviet Union and was imbued with great lawmaking powers. In practice, however, it was a rubber stamp parliament which did little more than ratify decisions already made by the Soviet Union's executive organs and the Communist Party of the Soviet Union (CPSU) – always by unanimous consent; and listen to the General Secretary's speeches"
ITA_abolish_the_councils:0 "Abolish the Councils"
ITA_abolish_the_councils_desc:0 "Although the soviets were never formally dissolved by law, their original power and function were systematically erased and subordinated to the totalitarian control of the CPSU under the leadership of the \"man of steel\", Iosif Dzhugashvili. \nThe Soviets' Revolutionary Promise\nInitially, during the 1917 Revolution, the slogan \"All power to the soviets!\" was primarily advocated by Comrade Lenin. The councils (of workers, soldiers, and peasants) were seen as the basis for a new proletarian democracy, self-governing bodies from below that would replace the bourgeois state.\nAfter Stalin's appointment to the General Secretariat, and especially after Lenin's death, the process of centralization began for reasons that Stalin's men justified as the compelling necessities of state survival. During this period: Factory councils were absorbed by trade unions directly controlled by the party.\nInternal party opposition, such as the Workers' Opposition which demanded economic management be entrusted to the Councils, was silenced.\nThe authentic \"soviet democracy\" that had been the initial aspiration of the revolution was effectively abolished. Under Stalin, the workers' councils lost all real power of initiative, debate, and control, becoming mere executive instruments of a single-party and personal dictatorship."
ITA_gosplan:0 "Gosplan"
ITA_gosplan_desc:0 "The State Planning Committee, commonly known as Gosplan (Russian: Госплан), was the agency responsible for central economic planning in the Soviet Union. Established in 1921 and remaining in existence until the dissolution of the Soviet Union in 1991, Gosplan had as its main task the creation and administration of a series of five-year plans governing the economy of the USSR."
ITA_controlled_union:0 "Controlled Union"
ITA_controlled_union_desc:0 "In the Eastern Bloc, \"controlled labour unions\" were the standard model. These unions were integral components of the single-party communist state apparatus, effectively serving as an extension of the state and the Communist Party, rather than independent advocates for workers' rights."
ITA_fiveyear_plan:0 "Five-year plan"
ITA_fiveyear_plan_desc:0 "The five-year plans for the development of the national economy of the USSR; consisted of a series of nationwide centralized economic plans in the Soviet Union, beginning in the late 1920s. The Soviet state planning committee Gosplan developed these plans based on the theory of the productive forces that formed part of the ideology of the Communist Party for development of the Soviet economy. Fulfilling the current plan became the watchword of Soviet bureaucracy."
ITA_social_credit_sistem:0 "Social Credit Sistem"
ITA_social_credit_sistem_desc:0 "The Social Credit System is a national credit rating and blacklist implemented by the government of the People's Republic of China. The social credit system is a record system so that businesses, individuals, and government institutions can be tracked and evaluated for trustworthiness. It is based on varying degrees of whitelisting (termed redlisting in China) and blacklisting.\n\nThere has been a widespread misconception that China operates a nationwide and unitary social credit \"score\" based on individuals' behavior, leading to punishments if the score is too low. Media reports in the West have sometimes exaggerated or inaccurately described this concept. In 2019, the central government voiced dissatisfaction with pilot cities experimenting with social credit scores. It issued guidelines clarifying that citizens could not be punished for having low scores and that punishments should only be limited to legally defined crimes and civil infractions. As a result, pilot cities either discontinued their point-based systems or restricted them to voluntary participation with no major consequences for having low scores. According to a February 2022 report by the Mercator Institute for China Studies (MERICS), a social credit \"score\" is a myth as there is \"no score that dictates citizen's place in society\""
ITA_politburo:0 "Politburo"
ITA_politburo_desc:0 "The \"Politburo\" or \"Political Bureau\" is the highest organ of the central committee in communist (stalinist) parties. The term is also sometimes used to refer to similar organs in socialist and Social-Democtat parties. Politburos are part of the governing structure in most former and existing communist states like China, Cambodia..."
ITA_communism_in_one_continent:0 "Communism in one Continent"
ITA_communism_in_one_continent_desc:0 "Socialism in One Country was a Soviet state policy aimed at strengthening Stalinist socialism domestically, rather than globally. Joseph Stalin developed and encouraged the theory of building socialism in the Soviet Union alone. The theory was eventually adopted as Soviet state policy."
ITA_recreate_the_nkvd:0 "Recreate the NKVD"
ITA_recreate_the_nkvd_desc:0 "The People's Commissariat for Internal Affairs, abbreviated as NKVD, was the interior ministry and secret police of the Soviet Union from 1934 to 1946. The agency was formed to succeed the Joint State Political Directorate (OGPU) secret police organization, and thus had a monopoly on intelligence and state security functions. The NKVD is known for carrying out political repression and the Great Purge under Joseph Stalin, as well as counterintelligence and other operations on the Eastern Front of World War II. The head of the NKVD was Genrikh Yagoda from 1934 to 1936, Nikolai Yezhov from 1936 to 1938, Lavrentiy Beria from 1938 to 1946, and Sergei Kruglov in 1946."
ITA_peoplesarmy:0 "People's Army"
ITA_peoplesarmy_desc:0 "\"People's Army\" serves as the armed wing of the ruling Communist Party, operating under the absolute control of the party leadership. Its primary roles extend beyond national defense to include the consolidation of the party's political power, internal security, and ideological indoctrination of its members and the populace."
ITA_overwrite_marx:0 "Overwrite Marx"
ITA_overwrite_marx_desc:0 "\"Overwriting Marx\" is the phrase used to describe the way Stalinism diverged from Karl Marx's original theories. Stalinism significantly modified or abandoned several fundamental tenets of Marxism, replacing them with a totalitarian and highly centralized system of government and economic policy."
ITA_cooperates_with_prc:0 "Cooperates with PRC"
ITA_cooperates_with_prc_desc:0 "The Soviet Union (USSR) and the People's Republic of China (PRC) had a period of close cooperation and a formal alliance during the 1950s, followed by a dramatic breakdown in relations known as the Sino-Soviet split.\n\nWe cannot make this mistake and the alliance with the PRC is essential for the security of the homeland of socialism."
ITA_the_red_book:0 "the Red Book"
ITA_the_red_book_desc:0 "The Revival of the Red Book.\nMore than just a book, the \"Little Red Book\" (original title: Quotations from Chairman Mao) was a sociopolitical phenomenon and an iconic symbol of Maoist China and the global revolutionary movements of the 20th century.\nIt was literally the \"Bible\" of the Maoist Cultural Revolution;\nOriginally conceived in 1964 by General Lin Biao as an ideological manual for the People's Liberation Army, the booklet quickly became the secular \"Bible\" and sacred text of the Cultural Revolution (1966–1976). Mao, feeling he had lost influence within the Communist Party after the failure of the Great Leap Forward, mobilized the younger generation, the infamous Red Guards, to \"purify\" the party and society of \"bourgeois\" elements."
ITA_stalin_cult:0 "Stalin Cult"
ITA_stalin_cult_desc:0 "Joseph Stalin's cult of personality became a prominent feature of Soviet popular culture. Historian Archie Brown sets the celebration of Stalin's 50th birthday on 21 December 1929 as the starting point for his cult of personality. For the rest of Stalin's rule, the Soviet propaganda presented Stalin as an all-powerful, all-knowing leader, with Stalin's name and image displayed all over the country."
ITA_peoplesyugoslavia:0 "People's Yugoslavia"
ITA_peoplesyugoslavia_desc:0 "On November 29, 1945, the Socialist Federal Republic of Yugoslavia was born.\n\nMarshal Tito, head of government, undertook a policy of alliance with the Soviet Union and established a Stalinist regime ruled by the \"Leage of Communists of Yugoslavia\". After 1948, a progressive departure from the USSR began, in order to be able to freely govern the economy of their own country and make it develop. After several disagreements with Moscow on foreign and domestic policy, in 1948 Yugoslavia was expelled from Cominform, definitively leaving the orbit of Soviet influence.\n\nTito's Yugoslavia remained a country with a centralized economy and \"State Capitalism\", although in 1950 Tito inaugurated a policy of self-management of workers that was the basis of the Yugoslav production system. Internationally, Tito founded the Non-Aligned Movement in 1956, with Egyptian President Nasser and Indian Prime Minister Nehru. Domestic politics was characterized by a strong centralization of power."
ITA_peoplesaustriahungary:0 "Peoples' Austria Hungary"
ITA_peoplesaustriahungary_desc:0 "The Hungarian People's Republic (HPR) was a landlocked country in Central Europe from its formation on 20 August 1949 until the establishment of the current Republic of Hungary on 23 October 1989. It was a professed Stalinist state, governed first by the Hungarian Working People's Party and after the Hungarian Revolution of 1956, the Hungarian Socialist Workers' Party. Both governments were closely tied to the Soviet Union as part of the Eastern Bloc.\n\nThe state considered itself the heir to the Hungarian Soviet Republic, which was formed in 1919 as one of the first communist states created after the Russian Soviet Federative Socialist Republic (Russian SFSR). It was designated a \"people's democratic republic\" by the Soviet Union in the 1940s."
ITA_peoplesromania:0 "Peoples' Romania"
ITA_peoplesromania_desc:0 "The Socialist Republic of Romania (Romanian: Republica Socialistă România, RSR) was a communist state that existed officially in Romania from 1947 to 1989 (see Revolutions of 1989). From 1947 to 1965, the state was known as the Romanian People's Republic (Republica Populară Romînă, RPR). The country was an Eastern Bloc state and a member of the Warsaw Pact with a dominant role for the Romanian Communist Party enshrined in its constitutions. Geographically, RSR was bordered by the Black Sea to the east, the Soviet Union (via the Ukrainian and Moldavian SSRs) to the north and east, Hungary and Yugoslavia (via SR Serbia) to the west, and Bulgaria to the south."
ITA_bulgarianpeoplesrepublic:0 "Bulgarian Peoples' Republic"
ITA_bulgarianpeoplesrepublic_desc:0 "The People's Republic of Bulgaria was a Stalinist state from 1946 to 1990, ruled by the Bulgarian Communist Party together with its coalition partner, the Bulgarian Agrarian People's Union. Bulgaria was also part of Comecon as well as a member of the Warsaw Pact. The Bulgarian resistance movement during World War II deposed the Tsardom of Bulgaria administration in the Bulgarian coup d'état of 1944 which ended the country's alliance with the Axis powers and led to the People's Republic in 1946."
ITA_a_democratic_germany:0 "a Democratic Germany"
ITA_a_democratic_germany_desc:0 "The liberal regime in Berlin serves only as a shield for bourgeois interests and a barrier to the global revolution. To ensure the survival of our socialist state, we must overthrow the capitalist government of Germany by force and liberate its massive working class."
ITA_peoplesspain:0 "Peoples' Spain"
ITA_peoplesspain_desc:0 "If our socialist republic is to survive, the Mediterranean must be cleansed of imperialist and fascist influence. Spain controls the vital gateway to the Atlantic, yet its government remains violently hostile to our revolution. We cannot allow such a reactionary dagger to remain pointed at our back. We will bring the Spanish workers into our sphere, securing the sea and establishing an unbreakable red bastion in Southern Europe."
ITA_peoplesczechoslovakia:0 "peoples' Czechoslovakia"
ITA_peoplesczechoslovakia_desc:0 "The vast industrial complexes of Bohemia and Moravia, from the assembly lines of Pilsen to the mines of Slovakia, churn out weapons not for the defense of the people, but for the profit of the bourgeois elite. Prague’s democratic veneer cannot mask the exploitation of its working class. We will march across the Danube to break their chains, nationalize their heavy industry, and transform the jewel of Central Europe into a beacon of syndicalist and communist progress. The Skoda works will now forge the weapons of the global revolution!"
ITA_restore_the_storic_allience:0 "Restore the storic allience."
ITA_restore_the_storic_allience_desc:0 "The Dvx tries to strengthen the reputation between Italy and Germany."
ITA_propaganda_manifest:0 "Propaganda manifest."
ITA_propaganda_manifest_desc:0 "The dvx asks the 'Gran Consiglio del Fascismo' to put many manifests against Communism and exalt Fascism and Nationalism"
ITA_giveistriabackyouthieves:0 "Give Istria back you thieves!"
ITA_giveistriabackyouthieves_desc:0 "Ask Croatia to give us Istria back peacefully or we will have to use our power."
ITA_givecorsicabackyouthieves:0 "Give Corsica back you thieves!"
ITA_givecorsicabackyouthieves_desc:0 "Ask Francia to give us Corsica back peacefully or we will have to use our power."
ITA_lessons_from_the_paris_commune:0 "Lessons from the Paris Commune"
ITA_lessons_from_the_paris_commune_desc:0 "The Paris Commune (French: Commune de Paris) was a French revolutionary government that seized power in Paris on 18 March 1871 and controlled the city until 28 May 1871. During the Franco-Prussian War of 1870–71, the French National Guard had defended Paris, and working class radicalism grew among its soldiers. Following the establishment of the French Third Republic in September 1870 (under French chief-executive Adolphe Thiers from February 1871) and the complete defeat of the French Army by the Germans by March 1871, soldiers of the National Guard seized control of the city on 18 March. The Communards killed two French Army generals and refused to accept the authority of the Third Republic; instead, the radicals set about establishing their own independent government."
ITA_marxengelslenincervetto:0 "Marx, Engels, Lenin, Cervetto"
ITA_marxengelslenincervetto_desc:0 "Lenin had a teacher in Marx and Engels, Cervetto had a teacher in Marx, Engels and Lenin, we have a teacher in Marx, Engels, Lenin and Cervetto"
ITA_lotta_comunista:0 "Lotta Comunista"
ITA_lotta_comunista_desc:0 "Lotta Comunista is a far-left internationalist vanguard party founded by Arrigo Cervetto and Lorenzo Parodi in 1965 and inspired by the theory and practice of Marx, Engels, and Lenin.\n\nThe founding group came from the working-class experience of anarchism and libertarian communism (GAAP, Anarchist Groups for Proletarian Action). Following the resistance, they aligned themselves with Leninist positions, both theoretically drawing on Lenin and modeling themselves on the Bolshevik Party.\n\n\nIt is the party that most of all led the revolution\n\nLotta Comunista is the Italian section of the International."
ITA_a_true_leninism:0 "A true Leninism"
ITA_a_true_leninism_desc:0 "The key tenets of Leninism, primarily outlined in his works like What Is to Be Done? and Imperialism, the Highest Stage of Capitalism, include:\nThe Vanguard Party: Lenin argued that the working class, on its own, could only develop a \"trade-union consciousness\" focused on immediate economic gains. A disciplined, centralized, and professional revolutionary party was necessary to instill true socialist (political) consciousness, organize, and lead the proletariat to revolution.\nDemocratic Centralism: This organizational principle allows for free and open discussion and debate within the party until a decision is reached; after a consensus is made, all members are expected to adhere to the agreed-upon policy and act in unity.\nImperialism as the Highest Stage of Capitalism: Lenin's analysis proposed that capitalism had evolved into a global financial system (imperialism) where industrialized nations exploited colonies for resources and cheap labor. This allowed wealthy countries to maintain a \"labor aristocracy\" and prevent a domestic revolution. Therefore, a proletarian revolution would most likely occur in an underdeveloped country like Russia, which was the \"weakest link\" in the global capitalist chain.\nDictatorship of the Proletariat: After the capitalist state is overthrown, the vanguard party would establish a state where the working class holds political power to suppress counter-revolutionary opposition and facilitate the transition to socialism."
ITA_thecouncilsinternational:0 "the \"Councils International\""
ITA_thecouncilsinternational_desc:0 "The International was founded at the initiative of the European Bolsheviks. The First Congress was held in Milan on December 21, with the aim of supporting the government and the revolution on the European continent. It encouraged the communist parties around the world to organize into \"sections of the International\" (those pro-Communism Lotta) or \"Revolutionary Communist Party\" (if they were Trotskyists), and served to spread the revolution internationally.\n\nThe Second Congress, to be held soon, will feature delegations from 97 nations. The organization's foundations and program, which revolve around the core of the European Revolution, will be drawn up. From the beginning, the World International was dominated by Communist Lotta and the PCR, as evidenced by the fact that the organization's leadership has, until now, been composed of an executive committee with members almost exclusively from the aforementioned parties."
ITA_state_atheism:0 "State Atheism"
ITA_state_atheism_desc:0 "State atheism is the incorporation of hard atheism or non-theism into political States. It is considered the opposite of theocracy and may also refer to large-scale secularization attempts by governments. To some extent, it is a religion-state relationship that is usually ideologically linked to irreligion and the promotion of irreligion or atheism. State atheism may refer to a government's promotion of anti-clericalism, which opposes religious institutional power and influence in all aspects of public and political life, including the involvement of religion in the everyday life of the citizen. In some instances, religious symbols and public practices that were once held by religions were replaced with secularized versions of them. State atheism in these cases is considered as not being politically neutral toward religion, and therefore it is often considered non-secular."
ITA_secular_state:0 "Secular State"
ITA_secular_state_desc:0 "A secular state is an idea pertaining to secularity, whereby a state is or purports to be officially neutral in matters of religion, supporting neither religion nor irreligion.[1] A secular state claims to treat all its citizens equally regardless of religion, and claims to avoid preferential treatment for a citizen based on their religious beliefs, affiliation or lack of either over those with other profiles."
ITA_civil_weddings:0 "Civil Weddings"
ITA_civil_weddings_desc:0 "A civil union (also known as Civil Weddings or civil partnership) is a legally recognized arrangement similar to marriage, primarily intended to provide legal recognition for same-sex couples. Civil unions grant some or all of the rights of marriage, with child adoption being a common exception.\n\nCivil unions have been established by law in several mostly developed countries in order to provide legal recognition of relationships formed by same-sex couples and to afford them rights, benefits, tax breaks, and responsibilities. In 1989, Denmark was the first country to legalise civil unions; however, most other developed democracies did not begin establishing them until the 1990s and early 2000s. In Brazil, civil unions were first created for opposite-sex couples in 2002, and then expanded to include same-sex couples in 2011. In the majority of countries that established same-sex civil unions, they have since been either supplemented or replaced by same-sex marriage. Civil unions are viewed by LGBT rights campaigners as a \"first step\" towards establishing same-sex marriage, as civil unions are viewed by supporters of LGBT rights as a \"separate but equal\" status."
ITA_marriage_equality:0 "Marriage equality"
ITA_marriage_equality_desc:0 "same-sex marriage, also known as Marriage equality or same-gender marriage, is the marriage of two people of the same legal sex or gender. As of 21st century, marriage between same-sex couples is legally performed and recognized in many countries.\n\nSame-sex marriage is legally recognized in a large majority of the world's developed countries; notable exceptions are Japan and South Korea. Adoption rights are not necessarily covered, though most states with same-sex marriage allow those couples to jointly adopt as other married couples can. Some countries, for example Russia, restrict advocacy for same-sex marriage. A few of these are among countries that constitutionally define marriage to prevent marriage between couples of the same sex, with most of those provisions enacted in recent decades as a preventative measure."
ITA_a_new_red_army:0 "A New Red Army"
ITA_a_new_red_army_desc:0 "The Workers' and Peasants' Red Army, often referred by its shortened name as the Red Army, was the army and air force of the Russian Soviet Republic and, from 1922, the Soviet Union. The army was established in January 1918 by a decree of the Council of People's Commissars to oppose the military forces of the new nation's adversaries during the Russian Civil War, especially the various groups collectively known as the White Army."
ITA_five_year_plan:0 "Five year plan"
ITA_five_year_plan_desc:0 "The five-year plans for the development of the national economy of the USSR; consisted of a series of nationwide centralized economic plans in the Soviet Union, beginning in the late 1920s. The Soviet state planning committee Gosplan developed these plans based on the theory of the productive forces that formed part of the ideology of the Communist Party for development of the Soviet economy. Fulfilling the current plan became the watchword of Soviet bureaucracy."
ITA_general_labor_union:0 "General Labor Union"
ITA_general_labor_union_desc:0 "A general labor union, or \"general labor union,\" is a trade union organization open to all workers, regardless of their specific professional category."
ITA_public_school:0 "Public School"
ITA_public_school_desc:0 "In true, theoretical communism as envisioned by Karl Marx and Friedrich Engels (a classless, stateless society), the concept of a \"public school\" would be fundamentally different from its current form. Education would be an integrated, communal process, free from the class divisions and state control characteristic of capitalist or state-socialist systems. \n• Abolition of Class-Based Education\n• Education as a Public Good\n• Focus on Collective and Practical Learning"
ITA_a_new_building_plan:0 "A new building plan"
ITA_a_new_building_plan_desc:0 "The socialist housing plan is a housing policy model radically different from the market model, based on the principles of public or collective ownership of the means of production (including land) and centralized economic planning. Its primary goal is to guarantee the right to housing as a public good and a human right, not as a commodity from which to extract profit."
ITA_a_house_for_everyone:0 "a house for everyone"
ITA_a_house_for_everyone_desc:0 "The expression \"a home for all\" refers primarily to the concept of the right to housing as a fundamental human and social right, and not as a luxury good or commodity.\nThis concept is central to various political ideologies, particularly within socialism and communism, where housing is not seen as \"private property\" (in the sense of capital or a means of extracting profit), but as \"personal property\" (in the sense of a place to live and satisfy a basic need)."
ITA_recreate_the_checka:0 "Recreate the Checka"
ITA_recreate_the_checka_desc:0 "The All-Russian Extraordinary Commission (Russian: Всероссийская чрезвычайная комиссия), and commonly known as the Cheka, was the first Soviet secret police organization. It was established on 20 December [our 7 December] 1917 by the Council of People's Commissars of the Russian SFSR. By the end of 1922, the Cheka had at least 200,000 active members in several countries fueling Socialist/Communist parties and possible revolutions. \n\nComrades of all countries, unite, you have nothing to lose but your chains!!! Comrades, break the chains! Break the chains!!!"
ITA_women_in_the_military:0 "Women in the military"
ITA_women_in_the_military_desc:0 "Women played a part in most of the armed forces of the Second World War. In most countries though, women tended to serve mostly in administrative, medical and in auxiliary roles. But in the Soviet Union women fought also in front line roles. Over 800,000 women served in the Soviet armed forces in World War II, mostly as medics and nurses, which is over 3 percent of total personnel; nearly 200,000 of them were decorated. 89 of them eventually received the Soviet Union’s highest award, the Hero of the Soviet Union, they served as pilots, snipers, machine gunners, tank crew members and partisans, as well as in auxiliary roles. Few of these women, however, were promoted to officers"
ITA_radicalize_the_army:0 "Radicalize the army"
ITA_radicalize_the_army_desc:0 "The term \"radicalization\" in the context of the Red Army/Soviet refers to the historical process of tightly integrating communist ideological control and political indoctrination within the armed forces, especially during periods of conflict such as the Russian Civil War and World War II. This process aimed to ensure political loyalty to the Communist Party."
ITA_solidarity_with_the_proletariat:0 "solidarity with the proletariat"
ITA_solidarity_with_the_proletariat_desc:0 "The Red Army was founded explicitly as the armed organ of the revolutionary masses and was fundamentally linked to the concept of proletarian solidarity, both within Russia and internationally. Its original name was the \"Workers' and Peasants' Red Army\"."
ITA_theimportanceofworkersclubs:0 "The importance of workers' clubs"
ITA_theimportanceofworkersclubs_desc:0 "The Workers' Club (or Workers' Circles) are the local branches of Lotta COmunista; they are the organizational base and territorial reference point for this party. The Workers' Circles are where both political and social solidarity activities take place.\nThe Lotta Comunista's ideology is based on Marxism-Leninism and internationalism, with the goal of organizing the working class internationally for a revolutionary transformation of society, rejecting reformist theories. Their \"motto\", in line with socialist tradition, is \"Workers of all countries, unite!\""
ITA_a_council_in_every_city:0 "A Council in Every City"
ITA_a_council_in_every_city_desc:0 "In Marxist theory, the idea of a \"council in every city\" is fundamentally linked to the concept of workers' councils (or Soviets), which are seen as a form of self-organization and a potential alternative to traditional capitalist forms of local government, rather than the existing city councils"
ITA_revolutionary_spirit_around_the_world:0 "Revolutionary Spirit around the World"
ITA_revolutionary_spirit_around_the_world_desc:0 "The global revival of interest in socialism and communism is not a monolithic phenomenon, but a mosaic of heterogeneous trends that primarily respond to a growing dissatisfaction with the dynamics of contemporary capitalism.\nIn the West, there is a notable renewed interest in socialist ideas among younger generations. For Gen Z and Millennials, socialism evokes the idea of ​​a more equitable system: universal public healthcare, state education, collectivization of land, factories for workers... Movements like the RCP in America have grown, bringing these demands into mainstream political debate. In Europe, parties like \"Lotta Comunista\" represent the more revolutionary vision, while parties like Die Linke in Germany, the PSOE in Spain, and others represent the more reformist form of socialism.\nLatin America continues to be an epicenter of leftist movements, with a recent \"Pink Tide\" bringing socialist parties to power in Brazil, Colombia, and Chile. These governments seek to address poverty and inequality through social reforms and greater state control over natural resources, while navigating economic challenges and geopolitical pressures.\nAs for the formally communist states, they have taken pragmatic and diverse paths."
ITA_workersofallcountriesunite:0 "Workers of All Countries Unite!"
ITA_workersofallcountriesunite_desc:0 "Global revolution is a central concept in Marxist theory, which envisions the overthrow of capitalism in all countries through the conscious and organized revolutionary action of the working class (the proletariat). The ultimate goal is the establishment of world socialism and, subsequently, a classless, stateless communist society."
ITA_ix_congress_of_council:0 "IX Congress of Council"
ITA_ix_congress_of_council_desc:0 "Congress of Council"
ITA_red_star_flies_over_the_sky:0 "Red Star flies Over the sky"
ITA_red_star_flies_over_the_sky_desc:0 "Workers thirst for knowledge because they need it to win. Nine out of ten workers have understood that knowledge is a weapon in their struggle for emancipation, and that it is now up to them to truly give everyone access to education. Our cause is assured because the people themselves have begun to build a new, socialist society. They are learning from their own experience, from their failures and mistakes, and they see how education is indispensable to the victorious conclusion of their battle. Despite the apparent collapse of many institutions and the jubilation of sabotaging intellectuals, we find that experience in battle has taught the people how to take their destiny into their own hands. All those who truly sympathize with the people and all the best teachers will come to our aid, and this is a sure guarantee that the socialist cause will triumph."
ITA_the_party_of_working_class:0 "the Party of Working Class"
ITA_the_party_of_working_class_desc:0 "The notion of the Communist Party as the \"Party of the Working Class\" is a foundational concept deeply embedded in Marxist and Leninist theory, playing a crucial role in both the theory and practice of revolutionary movements. This idea is often debated but remains central to the political identity of communist movements around the world. At its core, the Communist Party is conceived as the \"vanguard\" of the proletariat—the advanced detachment of the working class tasked with leading the masses toward revolutionary change.\nThe theoretical foundation of this view rests on the understanding of class consciousness and the historical mission of the working class. In capitalist societies, while workers share similar economic conditions, they do not automatically develop an understanding of their shared interests or the need for collective action. This is where the Communist Party steps in: it is composed of the most class-conscious and ideologically advanced individuals, including both workers and intellectuals, who bring revolutionary theory to the masses. This leadership is seen as vital for raising the workers' awareness of their common struggles and the need for revolution to overthrow capitalism.\nThe Communist Party’s role, then, is not just to articulate the desires and grievances of workers but to channel these into a broader revolutionary movement. It aims to elevate immediate, localized economic struggles to the ultimate goal of class emancipation, which can only be achieved through the overthrow of the capitalist system. This is why the party is considered an indispensable organ in the struggle: without it, the working class is seen as incapable of breaking free from the capitalist order.\nTo effectively fulfill this vanguard role, the Communist Party is typically organized around the principle of democratic centralism. This organizational structure is designed to ensure both unity and discipline within the party, enabling it to act decisively against the centralized capitalist state. Democratic centralism involves a balance between internal discussion and debate (democracy) and a unified, binding decision once a course of action is decided (centralism). This approach is seen as crucial for maintaining the party's cohesion and ensuring its ability to function effectively in the face of powerful external opposition.\nThe Communist Party also aims to be deeply rooted within the working class itself, organizing at the grassroots level in factories, neighborhoods, and other spaces where workers are concentrated. This organizational strategy seeks to transcend divisions created by capitalism—such as those based on race, gender, and nationality—fostering unity among the working class across these lines. In this way, the Communist Party positions itself not only as a political force but as a model of revolutionary unity, striving to unite the working class into a cohesive force capable of challenging and ultimately dismantling the capitalist system."
ITA_intellectual_vanguard:0 "Intellectual Vanguard"
ITA_intellectual_vanguard_desc:0 "The concept of intellectual vanguard in the communist context refers to a group, typically composed of intellectuals and activists of greater political consciousness and discipline, who have the task of leading the working class (proletariat) towards revolution and the establishment of socialism."
ITA_rediscover_gramsci:0 "Rediscover Gramsci"
ITA_rediscover_gramsci_desc:0 "Antonio Francesco Gramsci (22 January 1891 – 27 April 1937) was an Italian Communist philosopher and politician (he was a communist but he was not a Marxist). He was a founding member of the PCdI [Communist Party of Italy]. A vocal critic of Benito Mussolini and fascism, he was imprisoned in 1926, and remained in prison until shortly before his death in 1937.\n\nDuring his imprisonment, Gramsci wrote more than 30 notebooks and 3,000 pages of history and analysis. His Prison Notebooks are considered a highly original contribution to 20th-century political theory. The notebooks cover a wide range of topics, including the history of Italy and Italian nationalism, the French Revolution, fascism, Taylorism and Fordism, civil society, the state, historical materialism, folklore, religion, and high and popular culture."
ITA_the_party_for_working_class:0 "the Party for Working Class"
ITA_the_party_for_working_class_desc:0 "This approach is better known as the Restricted party model; famously implemented by the most 20th-century communist states.\n\n“For” implies that the party leads the class towards revolution from above."
ITA_start_automation:0 "Start Automation"
ITA_start_automation_desc:0 "Automation in socialism is a key concept. It refers to the idea of harnessing advanced technology, including automation, to fundamentally reshape the economic system, particularly with the goal of improving the conditions of the working class and ultimately advancing toward a post-capitalist society. While automation is often associated with capitalist economies and the potential for worker displacement, in socialism, it is envisioned as a transformative force that can serve the interests of the people rather than capital. This idea is rooted in several core principles of socialist thought"
ITA_the_state_of_the_revolution:0 "The State of the Revolution"
ITA_the_state_of_the_revolution_desc:0 "Trotskyism is a branch of Marxism and Leninism developed by Russian revolutionary Leon Trotsky. It advocates for Permanent Revolution: Trotsky argued that in developing nations (like early 20th-century Russia), the capitalist class was too weak to complete its own democratic reforms. Therefore, the working class must seize power, immediately enacting socialist measures and driving the revolution globally"
ITA_pcr:0 "PCR"
ITA_pcr_desc:0 "The Revolutionary Communist Party (PCR) is a Trotskyist communist political party, the Italian section of the \"Revolutionary Communist International\" (a Trotskyist version of the International).\n\nThe PCR's organization and political positions have a continuity dating back to the 1980s. Until 2014, this group was known as FalceMartello (Hammer and Sickle), the same name as its monthly magazine.\n\nThe PCR is the Italian section of the Fifth International."
ITA_eurocommunism:0 "EuroCommunism"
ITA_eurocommunism_desc:0 "Eurocommunism was a sub-ideology born in the 1970s and 1980s within various Western European communist parties, which claimed to have developed a more pertinent theory and practice of social transformation than those in Eastern Europe. The trend was particularly evident in Italy, Spain, and France. It is commonly believed to have been spurred by the Prague Spring. Although the various parties converged against the Soviet factor, their doctrines remained Stalinist and pro-Soviet."
ITA_parliamentary_communism:0 "Parliamentary Communism"
ITA_parliamentary_communism_desc:0 "The term Parliamentary Communism generally refers to a specific approach or tendency within the communist movement (particularly the Trotskyists) that advocates achieving a communist society by maintaining a representative democratic political system, as opposed to an authoritarian revolution, a one-party state, or the council system."
ITA_central_committee:0 "Central Committee"
ITA_central_committee_desc:0 "A central committee is a political-executive organ designated as the highest organ of a communist party between two congresses. Per the principles of democratic centralism, a central committee is empowered to deal with any issue that falls under the party's purview. While formally retaining this role in socialist states, commonly referred to as communist states by outside observers, in practice, it delegates this authority to numerous smaller internal organs due to the infrequency of its meetings. The term of a central committee of a ruling communist party is usually five years. The party congress elects individuals to the central committee and holds it accountable. At the first central committee session held immediately after a congress, it elects the party leader, an office usually titled general secretary of the central committee, a political organ, commonly known as the politburo, and an executive organ, customarily named the secretariat."
ITA_trotskyist_constitution:0 "Trotskyist Constitution"
ITA_trotskyist_constitution_desc:0 "If Leon Trotsky had set out to write a constitution, it would almost certainly have been shaped by his lifelong struggle against bureaucracy and his belief that genuine socialism could only survive through active, participatory democracy among workers. Trotsky viewed the degeneration of the Soviet state not as an inevitable result of revolution, but as a consequence of the narrowing of political life and the elevation of an unaccountable bureaucratic caste. His constitution, therefore, would have aimed to create institutional barriers against such a process. The foundation of the state would rest on soviets—workers’, peasants’, and soldiers’ councils—elected freely and transparently, with representatives subject to immediate recall. Trotsky saw political vitality as essential to socialist development, so he would likely have permitted multiple socialist and working-class parties to operate, debate, and contest elections within the framework of a shared commitment to socialism. Political power, in his design, would not be concentrated in a single leader or permanent elite; instead, leadership roles would rotate, and administrative posts would be held for limited terms to prevent the crystallization of privilege.\nEconomically, Trotsky would have grounded the constitution in workers’ control of production, but not through rigid centralized command. He believed in planning, but planning that was dynamic, transparent, and constantly shaped by feedback from the workplace. Every factory and institution would have elected committees overseeing management, and national economic goals would be determined with input not only from central planners but also from trade unions, local soviets, and industry-level councils. This approach reflected his conviction that socialism must be both planned and democratic, capable of correcting its own errors and avoiding stagnation.\nCivil liberties would receive a more explicit and protected place in Trotsky’s constitution than they ever did in the early Soviet Union. Freedom of speech, the press, and assembly—at least for the working population and parties committed to socialist transformation—would be considered essential safeguards against bureaucratic domination. Trotsky understood that without open criticism and the possibility of alternative programs, no revolutionary society could remain healthy. Social rights, too, would be central: guaranteed employment, housing, education, and medical care, not as charity but as the material basis for an emancipated working class."
ITA_hastasiemprecomandante:0 "Hasta Siempre, Comandante"
ITA_hastasiemprecomandante_desc:0 "Ernesto \"Che\" Guevara (14 May 1928 – 9 October 1967) was an Argentine Marxist revolutionary, physician, author, guerrilla leader, diplomat, politician and military theorist. A major figure of the Cuban Revolution, his stylized visage has become a countercultural symbol of rebellion and global insignia in popular culture.\n\nAs a young medical student, Guevara travelled throughout South America and was appalled by the poverty, hunger, and disease he witnessed. His burgeoning desire to help overturn what he saw as the capitalist exploitation of Latin America by the United States prompted his involvement in Guatemala's social reforms under President Jacobo Árbenz, whose eventual CIA-assisted overthrow at the behest of the United Fruit Company solidified Guevara's political ideology. Later in Mexico City, Guevara met Raúl and Fidel Castro, joined their 26th of July Movement, and sailed to Cuba aboard the yacht Granma with the intention of overthrowing US-backed dictator Fulgencio Batista. Guevara soon rose to prominence among the insurgents, was promoted to second-in-command, and played a pivotal role in the two-year guerrilla campaign which deposed the Batista regime"
ITA_permanent_revolution:0 "Permanent revolution"
ITA_permanent_revolution_desc:0 "Trotsky's permanent revolution is an explanation of how socialist revolutions could occur in societies that have not achieved an advanced capitalist mode of production. Trotsky's theory also argues that the bourgeoisie in late-developing capitalist countries are incapable of developing the productive forces in such a manner as to achieve the sort of advanced capitalism which will fully develop an industrial proletariat; and that the proletariat can and must therefore seize social, economic and political power, leading an alliance with the peasantry. Trotsky also opposed Joseph Stalin's principle of socialism in one country and stated that socialist revolutions needed to happen across the world in order to combat the global capitalist hegemony. According to Russian historian Vadim Rogovin (1937–1998), the success of Stalin's theoretical position had a significant and negative impact on the entire course of the international revolutionary process."
ITA_iii_party_congress:0 "III Party Congress"
ITA_iii_party_congress_desc:0 "A Communist Party congress is the party's supreme decision-making body. It is a formal, periodic meeting (usually every few years) where delegates, elected by local or regional branches, gather to discuss and approve the party's strategy and policy for the coming period.\nIn many one-party systems (such as China, Laos, and Cambodia), the Communist Party congress is also the country's most important political event, as the decisions made there have direct repercussions on national policies, the economy, and the future direction of the state."
ITA_aworkersarmy:0 "a Workers' Army"
ITA_aworkersarmy_desc:0 "The term \"Workers' Army\" most commonly refers to the Workers' and Peasants' Red Army, which was the official name of the armed forces of Soviet Russia and later the Soviet Union from 1918 to 1946."
ITA_export_the_revolution:0 "Export the revolution"
ITA_export_the_revolution_desc:0 "Exporting the revolution is actions by a victorious revolutionary government of one country to promote similar revolutions in unruled areas or other countries as a manifestation of revolutionary internationalism of certain kind, such as the Marxist proletarian internationalism."
ITA_automation_of_the_labour:0 "Automation of the Labour"
ITA_automation_of_the_labour_desc:0 "In communist and Marxist theory, automation is seen as a key material basis and potential catalyst for achieving communism, not a threat to it. Proponents argue that automation, by eliminating the necessity of human labor in production, can lead to post-scarcity and thus create the material conditions for a society without class, money, or a forced need to work."
ITA_cooperative_factories:0 "cooperative factories"
ITA_cooperative_factories_desc:0 "Consumer goods factories produce finished products for individual households, such as clothing, electronics, and food. These factories are central to the economy and are often associated with a large portion of a nation's total factory output, with major global companies like Nestlé and Procter & Gamble being key players in this sector. The output can be categorized into durable goods, nondurable goods, and services."
ITA_a_free_internet:0 "a Free Internet"
ITA_a_free_internet_desc:0 "In a true socialist system, the internet would be conceptualized and managed fundamentally differently than the capitalist model, focusing on universal access, social ownership, and use for the common good rather than profit.\n\nInternet access would be considered a social public service, similar to electricity or drinking water, provided free or at minimal cost to all citizens. The state or a public entity would ensure that even rural or less profitable areas received high-quality service, eliminating the digital divide based on affordability.\nSocial ownership and democratic management: Network infrastructure (ISPs, data centers, cloud services) would be owned by the public, not by private companies. Network management and regulation would be decided democratically by the population or its representatives, rather than by corporate boards of directors, putting an end to profit-driven issues of net neutrality.\nProfit-driven online advertising and advertising, which often involve the collection and sale of users' personal data, would be eliminated.\nDigital platforms would exist to facilitate communication and knowledge sharing, not to promote consumerism.\nInstead of a monopoly held by a few global social platforms (like Google or Meta), there could be a network of national or publicly managed platforms, with greater democratic control over their operation and content."
ITA_trotsky_is_young_again:0 "Trotsky is Young Again"
ITA_trotsky_is_young_again_desc:0 "Trotsky joined the Russian Social Democratic Labour Party in 1898, being arrested and exiled to Siberia for his activities. In 1902 he escaped to London, where he met Lenin. Trotsky initially sided with the Mensheviks against Lenin's Bolsheviks in the party's 1903 schism, but declared himself non-factional in 1904. During the 1905 Revolution, Trotsky was elected chairman of the Saint Petersburg Soviet. He was again exiled to Siberia, but escaped in 1907 and lived abroad. After the February Revolution of 1917, Trotsky joined the Bolsheviks and was elected chairman of the Petrograd Soviet. He helped to lead the October Revolution, and as the People's Commissar for Foreign Affairs negotiated the Treaty of Brest-Litovsk, by which Russia withdrew from World War I. He served as People's Commissar for Military Affairs from 1918 to 1925, during which he built the Red Army and led it to victory in the civil war. In 1922 Lenin formed a bloc with Trotsky against the growing Soviet bureaucracy[3] and proposed that he should become a deputy premier,[4] but Trotsky declined.[5] Beginning in 1923, Trotsky led the party's Left Opposition faction, which supported greater levels of industrialisation, voluntary collectivisation and party democratisation in a shared framework with the New Economic Policy."
ITA_a_party_with_a_state:0 "a Party With a State"
ITA_a_party_with_a_state_desc:0 "the concept of a \"party with a state\" was the central, defining feature of the political landscape. These nations operated as one-party communist states where the ruling communist party held a complete monopoly on power and was fundamentally merged with all formal state institutions.\nThis system was characterized by single-party rule, where a sole Marxist–Leninist party dominated political life. While a few other minor parties sometimes legally existed, they were entirely subordinate to the ruling party within umbrella organizations known as \"national fronts,\" possessing no genuine opportunity to contest power.\nA core principle was the fusion of party and state. In practice, the party's elite leadership—specifically the Politburo and the General Secretary—made all significant decisions. These directives were then simply rubber-stamped by the formal state organs, such as national assemblies or councils of ministers. The extensive state bureaucracy and the powerful internal security apparatus (secret police organizations like the KGB or the Stasi) functioned primarily as instruments of the party's will.\nThe party maintained this rigid control through a structure known as democratic centralism, which mandated strict adherence to the decisions of senior leadership and effectively eliminated internal dissent or the formation of factions. This absolute authority extended to virtually all aspects of society: the party directed the centrally planned economy, controlled all media as a propaganda apparatus, and managed education and social organizations to ensure no independent opposition could emerge.\nKey examples of these ruling parties in the core Eastern Bloc countries included the Communist Party of the Soviet Union (CPSU), the Socialist Unity Party of Germany (SED) in East Germany, the Polish United Workers' Party (PZPR), and the Communist Party of Czechoslovakia (KSČ). This systemic model of the \"party with a state\" stands in stark contrast to the multi-party democracies that defined the Western Bloc during the Cold War ideological divide."
ITA_2027_election:0 "2027 Election"
ITA_2027_election_desc:0 "Political elections are the electoral consultations through which citizens elect members of the Italian Parliament, the Chamber of Deputies and the Senate of the Republic. Through this vote, voters determine the political balance of the country, influencing the formation of the Government and the legislative direction."
ITA_propaganda_in_the_neighborhoods:0 "Propaganda in the Neighborhoods"
ITA_propaganda_in_the_neighborhoods_desc:0 "propaganda in neighborhoods uses hyper-localized strategies—from grassroots door-to-door canvassing to digital micro-targeting—to shape community consensus. It often exploits local anxieties, such as crime or housing shortages, to build political bases, frequently utilizing social media or localized websites to sway civic participation"
ITA_political_debates:0 "political debates"
ITA_political_debates_desc:0 "Political debates are live, unfiltered forums where candidates present policies, contrast viewpoints, and respond to moderators and each other. These events—ranging from municipal town halls to national presidential matchups—help voters evaluate candidates' communication skills, character, and policy stances before Election Day."
ITA_i_am_giorgia:0 "I AM GIORGIA"
ITA_i_am_giorgia_desc:0 "IO SONO GIOGGIA !"
ITA_iamamotheriamachristian:0 "I AM A MOTHER, I AM A CHRISTIAN"
ITA_iamamotheriamachristian_desc:0 "SONO UNA MADRE!! SONO CRISTIANA!!"
ITA_nonmelotoglierete:0 "NON ME LO TOGLIERETE!"
ITA_nonmelotoglierete_desc:0 "YOU WON'T TAKE IT AWAY FROM ME!"
ITA_refugees_of_the_lega:0 "Refugees of the Lega"
ITA_refugees_of_the_lega_desc:0 "There is a significant shift of political exponents and electoral consensus from the Lega to Futuro Nazionale, the new political movement founded by General Roberto Vannacci after his formal split from Carroccio in February 2026"
ITA_fascist_sympathies:0 "Fascist Sympathies"
ITA_fascist_sympathies_desc:0 "Futuro Nazionale, the political movement founded by General Roberto Vannacci in February 2026, is located on the far right. The party attracts voters and figures of the radical right, promoting sovereignist and identity themes and winks at Neo-Fascists"
ITA_our_general:0 "Our General"
ITA_our_general_desc:0 "Roberto Vannacci (La Spezia, October 20, 1968) is an Italian politician and general.\n\nHe held the roles of commander of the \"Col Moschin\" Regiment, of the \"Folgore\" Brigade, of the Italian contingent in the civil war in Iraq, as well as of Task Force 45 during the War in Afghanistan.\n\nThe publication, in August 2023, of the book Il mondo al contrario brought him to the center of considerable media attention, followed by controversy and complaints, due to the controversial content expressed on topics such as homosexuality, immigration, feminism and environmentalism. Vannacci was temporarily suspended by the Army following an internal investigation according to which the publication of the book would have compromised the prestige and the principle of thirdness of the Army.\n\nRunning with the League as an independent in the 2024 European elections, he was elected. In February 2025 he ceased his service in the Army and in April he took the party card. In February 2026 he left the League and founded a new party, Futuro Nazionale."
ITA_minimum_salary:0 "minimum salary"
ITA_minimum_salary_desc:0 "The minimum wage is the lowest amount that an employer is obliged by law (or by agreement) to pay his employees for an hour or a month of work. It serves to protect workers from exploitation and to guarantee a decent wage that covers basic needs."
ITA_expand_the_welfare_state:0 "expand the welfare state"
ITA_expand_the_welfare_state_desc:0 "The welfare state is the set of public policies with which the State intervenes in the economy to guarantee assistance, equal opportunities and the well-being of citizens. It offers a safety net against the main social risks, such as poverty, unemployment, accidents, illness and old age."
ITA_patriotic_to_the_end:0 "Patriotic to the end"
ITA_patriotic_to_the_end_desc:0 "Patriotism merges with aggressive and ethnic nationalism, transforming love for one's land into an ideology of supremacy and submission of the individual to the state. This concept radically deviates from democratic and constitutional patriotism."
ITA_italian_manufacturing:0 "Italian Manufacturing"
ITA_italian_manufacturing_desc:0 "The Italian manufacturing industry is the second largest in Europe, with a value that exceeds 15% of GDP and generates more than 60% of national production. The sector is focused on high quality, artisanal excellence and technological innovation, with a strong orientation towards global exports."
ITA_the_empire_returns_to_rome:0 "the Empire Returns to Rome"
ITA_the_empire_returns_to_rome_desc:0 "The phrase \"the return of the Empire to the fated hills of Rome\" was famously declared by Benito Mussolini on May 9, 1936, following the annexation of Ethiopia and the proclamation of the Italian Empire."
ITA_wink_at_the_army:0 "wink at the army"
ITA_wink_at_the_army_desc:0 "For her part, Giorgia Meloni and the center-right coalition firmly reject the label of militarism, framing their decisions within a doctrine of geopolitical pragmatism and defense of the national interest."
ITA_ue_nato_support:0 "UE NATO Support"
ITA_ue_nato_support_desc:0 "Italy is one of the 12 founding countries of NATO (founded in 1949) and represents the second largest European contributor to the Alliance's missions and budget. The country plays a leading strategic role in the southern flank, offering operational bases and command of rapid intervention bodies"
ITA_soviet_army:0 "Soviet Army"
ITA_soviet_army_desc:0 "The Soviet Army (Russian: Советская Армия) was the official name of the ground forces of the Soviet Union from February 1946 until December 1991, when the USSR was officially dissolved. Before this date, the land and air military force was globally known by the founding name of the Red Army. At the height of its expansion, it was considered one of the largest and most powerful war machines in global history."
ITA_funding_for_healthcare:0 "Funding for Healthcare"
ITA_funding_for_healthcare_desc:0 "Healthcare funding is primarily driven by public revenue (taxation, national insurance), private investment, and international grants. In Italy, universal healthcare is heavily government-financed, aiming to provide care as a fundamental right. Globally, mechanisms range from public models to private health insurance and external development aid"
ITA_scala_mobile:0 "Scala Mobile"
ITA_scala_mobile_desc:0 "The \"Scala Mobile\" is an economic measure that consists of indexing wages according to the increases in the prices of some goods, in order to counteract the decrease in purchasing power due to the increase in the cost of living, as evaluated with a special consumer price index."
ITA_revitalizing_the_mezzogiorno:0 "Revitalizing the Mezzogiorno"
ITA_revitalizing_the_mezzogiorno_desc:0 "revitalizing \"the South\" likely refers to the ongoing efforts to revitalize Southern Italy (il Mezzogiorno), which includes boosting employment, infrastructure, and local manufacturing through special economic zones and regional investments."
ITA_carbon_neutrality:0 "Carbon neutrality"
ITA_carbon_neutrality_desc:0 "Carbon neutrality is a state of net-zero carbon dioxide emissions. It is achieved by balancing the carbon produced by human activity with an equivalent amount removed from the atmosphere or offset"
ITA_a_socialdemocratic_italy:0 "a Social-Democratic Italy"
ITA_a_socialdemocratic_italy_desc:0 "Social democracy is a center-left political, social, and economic ideology that advocates for a peaceful, reformist evolution of society toward social justice. Operating within a capitalist system, it seeks to counterbalance market inequalities through extensive state intervention, robust public services, and progressive taxation."
ITA_red_terror:0 "Red Terror"
ITA_red_terror_desc:0 "The Years of Terror (1936-1938): Under the leadership of Iosif Stalin, the NKVD was the main executor of the \"Great Purge\", carrying out mass arrests, torture and executions of hundreds of thousands of Soviet citizens, intellectuals and political opponents."
ITA_revolution_in_france:0 "Revolution in France"
ITA_revolution_in_france_desc:0 "The blood of the tyrants will return to wet the streets of Paris. We will erase the corrupt bourgeois republic with the fire of proletarian purification. There will be no compromise, there will be no mercy. The bayonets of the French workers will break the European capitalist. The tricolor dies, the Commune rises again."
ITA_revolution_in_germany:0 "Revolution in Germany"
ITA_revolution_in_germany_desc:0 "Exporting the revolution is actions by a victorious revolutionary government of one country to promote similar revolutions in unruled areas or other countries as a manifestation of revolutionary internationalism of certain kind, such as the Marxist proletarian internationalism."
ITA_revolution_in_spain:0 "Revolution in Spain"
ITA_revolution_in_spain_desc:0 "We will unleash a storm of flames that will reduce reactionaries and fascists to ashes. We will arm every single proletarian hand from Madrid to Barcelona to Lisbon. Iberia will not be a battlefield, it will be the slaughterhouse of the old world. The blood of the martyrs demands the total victory of the revolution."
ITA_revolution_in_britain:0 "Revolution in Britain"
ITA_revolution_in_britain_desc:0 "We will drown the empire in its own blood. We will infiltrate, sabotage and destroy the foundations of the monarchy from within. When the factories stop, the crown will fall into the mud. The British fleet will not defend the king, but will carry the revolutionary fire to every corner of the planet."
ITA_domino_effect:0 "Domino effect"
ITA_domino_effect_desc:0 "The communist domino theory is a geopolitical principle born during the Cold War, according to which if one nation fell under communist influence, neighboring countries would suffer the same fate. Popularized by President Dwight D. Eisenhower in 1954, it justified US interventionism for decades, especially in Vietnam."
